<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR1 - Attack Signal</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #10b981; --danger: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; transition: background-color 0.1s; }
        #status-box { background: var(--card); padding: 30px; border-radius: 15px; margin: 20px auto; max-width: 400px; border: 2px solid #334155; }
        #timer-text { font-size: 4rem; font-weight: bold; margin: 10px 0; }
        #connection-status { font-size: 0.8rem; color: #64748b; margin-bottom: 10px; }
        .btn-main { background: var(--danger); color: white; padding: 20px; border: none; border-radius: 10px; font-size: 1.2rem; cursor: pointer; width: 100%; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>NR1 🛡️ SIGNAL</h1>
    <div id="connection-status">Disconnected</div>
    
    <button id="start-btn" class="btn-main" onclick="initAudio()">CLICK TO ENABLE AUDIO</button>

    <div id="status-box" class="hidden">
        <div id="status-label">Waiting for signal...</div>
        <div id="timer-text">--</div>
    </div>

    <div style="margin-top: 40px;">
        <button onclick="triggerCountdown()" style="background: var(--accent); color: white; padding: 15px; border: none; border-radius: 5px; width: 100%;">START COUNTDOWN (5s)</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA8edMWQreJMKrbS8MuowKZl58x7W5vfBU", authDomain: "nr1-vikings.firebaseapp.com", databaseURL: "https://nr1-vikings-default-rtdb.europe-west1.firebasedatabase.app", projectId: "nr1-vikings" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const signalRef = db.ref('attaque/countdown');
        let audioCtx;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('status-box').classList.remove('hidden');
        }

        function playTone(freq, duration) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        signalRef.on('value', (snap) => {
            document.getElementById('connection-status').innerText = "Connected";
            const targetTime = snap.val();
            if (!targetTime || targetTime === "WAIT") return;

            const interval = setInterval(() => {
                const diff = targetTime - Date.now();
                const sec = Math.ceil(diff / 1000);

                if (diff > 0 && diff <= 5000) {
                    document.getElementById('timer-text').innerText = sec;
                    document.getElementById('status-label').innerText = "Prepare yourself...";
                    playTone(440, 0.1);
                } else if (diff <= 0 && diff > -1000) {
                    document.getElementById('timer-text').innerText = "GO!";
                    document.getElementById('status-label').innerText = "ATTACK NOW!";
                    playTone(880, 0.8);
                    
                    // Flash effect
                    let count = 0;
                    let flash = setInterval(() => {
                        document.body.style.backgroundColor = (count % 2 === 0) ? "red" : "#0f172a";
                        count++;
                        if(count > 10) { clearInterval(flash); document.body.style.backgroundColor = "#0f172a"; }
                    }, 200);
                    
                    clearInterval(interval);
                }
            }, 1000);
        });

        function triggerCountdown() {
            signalRef.set(Date.now() + 5000);
        }
    </script>
</body>
</html>
