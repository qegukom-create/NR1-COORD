<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR1 War Signal</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
        padding: 20px;
        transition: background 0.2s;
    }

    #box {
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        max-width: 400px;
        margin: auto;
        margin-top: 20px;
    }

    #timer {
        font-size: 4rem;
        font-weight: bold;
        margin-top: 10px;
    }

    button {
        padding: 15px;
        width: 100%;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
    }

    .go {
        background: #ef4444;
        color: white;
    }

    .start {
        background: #10b981;
        color: white;
    }
</style>
</head>

<body>

<h2>⚔️ NR1 WAR ROOM</h2>

<div id="box">
    <div id="status">Waiting...</div>
    <div id="timer">--</div>
</div>

<button class="start" id="initBtn" onclick="initAudio()">ENABLE AUDIO</button>

<button class="go" onclick="trigger()">START ATTACK (leader)</button>

<script>
/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
    apiKey: "AIzaSyA8edMWQreJMKrbS8MuowKzl58x7W5vfBU",
    authDomain: "nr1-vikings.firebaseapp.com",
    databaseURL: "https://nr1-vikings-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "nr1-vikings"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = db.ref("attaque/countdown");

/* ---------------- TIME SYNC ---------------- */
let serverOffset = 0;

firebase.database().ref(".info/serverTimeOffset").on("value", snap => {
    serverOffset = snap.val() || 0;
});

function now() {
    return Date.now() + serverOffset;
}

/* ---------------- AUDIO ---------------- */
let audioCtx;

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();

    document.getElementById("initBtn").style.display = "none";

    setInterval(() => {
        if (audioCtx && audioCtx.state === "suspended") {
            audioCtx.resume();
        }
    }, 1000);
}

function playTone(freq, duration) {
    if (!audioCtx) return;

    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;
    gain.gain.value = 0.15;

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

/* ---------------- VIBRATION + GO ---------------- */
function alertGO() {
    playTone(880, 0.3);

    if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200, 100, 400]);
    }

    let i = 0;
    const flash = setInterval(() => {
        document.body.style.background =
            (i % 2 === 0) ? "red" : "#0f172a";
        i++;
        if (i > 8) {
            clearInterval(flash);
            document.body.style.background = "#0f172a";
        }
    }, 150);
}

/* ---------------- COUNTDOWN ---------------- */
let interval;

ref.on("value", snap => {
    const target = snap.val();
    if (!target || target === "WAIT") return;

    clearInterval(interval);

    interval = setInterval(() => {
        const diff = target - now();
        const sec = Math.ceil(diff / 1000);

        if (diff > 0 && diff <= 5000) {
            document.getElementById("status").innerText = "Prepare...";
            document.getElementById("timer").innerText = sec;
            playTone(440, 0.08);
        }

        else if (diff <= 0 && diff > -800) {
            document.getElementById("status").innerText = "ATTACK!";
            document.getElementById("timer").innerText = "GO!";
            alertGO();
            clearInterval(interval);
        }

        else {
            document.getElementById("timer").innerText =
                sec > 0 ? sec : "0";
        }

    }, 200);
});

/* ---------------- LEADER START ---------------- */
function trigger() {
    const startTime = Date.now() + 7000; // buffer sync
    ref.set(startTime);
}
</script>

</body>
</html>
